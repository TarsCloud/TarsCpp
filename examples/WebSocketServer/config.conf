<tars>
  <application>
    <client>
        locator                     = tars.tarsregistry.QueryObj@tcp -h 127.0.0.1 -p 17890
        sync-invoke-timeout         = 5000
        refresh-endpoint-interval   = 10000
        stat                        = tars.tarsstat.StatObj
        sendqueuelimit              = 100000
        asyncqueuecap               = 100000
        asyncthread                 = 3
        netthread                   = 1
        mergenetasync               = 0
        modulename                  = TestApp.WebSocketServer
    </client>

    <server>
        closecout = 0
        app      = TestApp
        server   = WebSocketServer
        basepath = ./
        datapath = ./
        logpath  = ./
        mergenetimp = 0
        local   = tcp -h 127.0.0.1 -p 18080 -t 10000

        clientpage = websocket_client.html
        websocketpath = /ws

        <HttpAdapter>
            endpoint = tcp -h 0.0.0.0 -p 18081 -t 10000
            allow    =
            maxconns = 4096
            threads  = 2
            servant  = TestApp.WebSocketServer.HttpObj
            queuecap = 1000000
            protocol = not-tars
        </HttpAdapter>

        <WebSocketAdapter>
            endpoint = tcp -h 0.0.0.0 -p 18082 -t 10000
            allow    =
            maxconns = 4096
            threads  = 5
            servant  = TestApp.WebSocketServer.WebSocketObj
            queuecap = 1000000
            protocol = not-tars
        </WebSocketAdapter>
    </server>
  </application>
</tars>
